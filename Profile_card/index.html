<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">

        <!-- IMAGE -->
        <div class="image-container">
            <img src="/Profile_card/WhatsApp Image 2025-09-15 at 2.23.18 PM.jpeg" alt="profile">
        </div>

        <!-- TEXT -->
        <div class="text-container">
            <h2>Chetan Chauhan</h2>
            <p class="role">Future MERN Developer 🚀</p>
            <p class="bio">Turning logic into code and ideas into real apps.</p>
        </div>

        <!-- BUTTONS -->
        <div class="button-container">
            <button>GitHub</button>
            <button>LinkedIn</button>
            <button>Instagram</button>
        </div>

        <!-- JS FEATURES -->
        <button id="toggle">🌙</button>
        <button id="switch">Switch Mode</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
